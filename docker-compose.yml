version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pcn_eol_db
      POSTGRES_USER: pcndev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcndev -d pcn_eol_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://pcndev:devpassword@postgres:5432/pcn_eol_db
      - AI_SERVICE_MODE=mock
      - EMAIL_INGEST_MODE=mock
      - LOCAL_UPLOAD_DIR=./uploads
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./apps/web/src:/app/src

volumes:
  pgdata:

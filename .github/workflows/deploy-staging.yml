name: Deploy to Staging

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api run db:generate

      - name: Build API
        run: pnpm --filter api build

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm --filter api exec prisma migrate deploy

      - name: Prepare deploy package
        run: |
          cd apps/api
          mkdir -p deploy

          # Copy built app + prisma schema
          cp -r dist deploy/
          cp -r prisma deploy/
          cp package.json deploy/

          # Install only production deps in deploy folder
          cd deploy
          npm install --omit=dev --ignore-scripts 2>&1 | tail -5

          # Also need shared packages
          mkdir -p packages/shared
          cp -r $GITHUB_WORKSPACE/packages/shared/* packages/shared/

          # Need @prisma/client from the generated output
          mkdir -p node_modules/.prisma
          cp -r $GITHUB_WORKSPACE/node_modules/.prisma/client node_modules/.prisma/client
          cp -r $GITHUB_WORKSPACE/node_modules/@prisma node_modules/@prisma 2>/dev/null || true

          echo "Deploy size: $(du -sh . | cut -f1)"
          zip -r -q ../deploy.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: pcn-eol-api-staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: apps/api/deploy.zip

  deploy-web:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://pcn-eol-api-staging.azurewebsites.net/api/v1
        run: pnpm --filter web build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /apps/web/dist
          skip_app_build: true

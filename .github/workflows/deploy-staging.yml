name: Deploy to Staging

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api run db:generate

      - name: Build API
        run: pnpm --filter api build

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm --filter api exec prisma migrate deploy

      - name: Prepare deploy package
        run: |
          cd apps/api
          mkdir -p deploy/dist deploy/prisma deploy/node_modules
          cp -r dist/* deploy/dist/
          cp -r prisma/schema.prisma deploy/prisma/
          cp package.json deploy/
          # Install production dependencies in deploy folder
          cd deploy
          cat > package.json << 'PKGJSON'
          {
            "name": "pcn-eol-api",
            "version": "0.1.0",
            "type": "module",
            "scripts": { "start": "node dist/app.js" },
            "engines": { "node": ">=22" }
          }
          PKGJSON
          npm init -y > /dev/null 2>&1 || true
          # Copy needed node_modules from parent
          cd $GITHUB_WORKSPACE
          cp -r node_modules apps/api/deploy/node_modules 2>/dev/null || true

      - name: Zip and Deploy to Azure
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
        run: |
          cd apps/api/deploy
          zip -r -q ../deploy.zip .
          cd ..
          curl -s -X POST \
            -u "${DEPLOY_USER}:${DEPLOY_PASS}" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            "https://pcn-eol-api-staging.scm.azurewebsites.net/api/zipdeploy" \
            -w "\nHTTP Status: %{http_code}\n"

  deploy-web:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://pcn-eol-api-staging.azurewebsites.net/api/v1
        run: pnpm --filter web build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /apps/web/dist
          skip_app_build: true

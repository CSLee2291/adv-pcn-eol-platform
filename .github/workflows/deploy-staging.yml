name: Deploy to Staging

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api run db:generate

      - name: Build API
        run: pnpm --filter api build

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm --filter api exec prisma migrate deploy

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp -r apps/api/dist deploy/
          cp -r apps/api/prisma deploy/
          cp apps/api/package.json deploy/
          cp pnpm-lock.yaml deploy/
          cp -r node_modules deploy/ 2>/dev/null || true
          cd deploy && echo "module.exports = require('./dist/app.js');" > index.js

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: pcn-eol-api-staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy/

  deploy-web:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://pcn-eol-api-staging.azurewebsites.net/api/v1
        run: pnpm --filter web build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /apps/web/dist
          skip_app_build: true

name: Deploy to Staging

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api run db:generate

      - name: Build API
        run: pnpm --filter api build

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm --filter api exec prisma migrate deploy

      - name: Prepare and deploy
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
        run: |
          # Create a standalone deploy directory
          mkdir -p /tmp/deploy

          # Copy built app
          cp -r apps/api/dist /tmp/deploy/dist
          cp -r apps/api/prisma /tmp/deploy/prisma
          cp apps/api/package.json /tmp/deploy/package.json

          # Copy the monorepo node_modules (includes all deps)
          cp -r node_modules /tmp/deploy/node_modules

          # Copy shared packages
          mkdir -p /tmp/deploy/packages
          cp -r packages /tmp/deploy/packages

          # Zip and deploy
          cd /tmp/deploy
          zip -r -q /tmp/deploy.zip . -x "node_modules/.cache/*"
          echo "Deploy package size: $(du -sh /tmp/deploy.zip | cut -f1)"

          # Zip Deploy to Azure
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            -u "${DEPLOY_USER}:${DEPLOY_PASS}" \
            --data-binary @/tmp/deploy.zip \
            -H "Content-Type: application/zip" \
            "https://pcn-eol-api-staging.scm.azurewebsites.net/api/zipdeploy?isAsync=true")
          echo "Deploy HTTP status: $HTTP_CODE"
          cat /tmp/deploy_response.txt || true
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Deployment failed!"
            exit 1
          fi

  deploy-web:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://pcn-eol-api-staging.azurewebsites.net/api/v1
        run: pnpm --filter web build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /apps/web/dist
          skip_app_build: true

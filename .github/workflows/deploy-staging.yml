name: Deploy to Staging

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api run db:generate

      - name: Build API
        run: pnpm --filter api build

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm --filter api exec prisma migrate deploy

      - name: Prepare deploy package
        run: |
          cd apps/api
          mkdir -p deploy

          # Copy built app + prisma schema
          cp -r dist deploy/
          cp -r prisma deploy/

          # Create a clean package.json without workspace: protocol
          node -e "
            const pkg = require('./package.json');
            // Remove workspace deps (shared package is copied directly)
            for (const [k,v] of Object.entries(pkg.dependencies || {})) {
              if (String(v).startsWith('workspace:')) delete pkg.dependencies[k];
            }
            pkg.scripts = { start: 'node dist/app.js' };
            require('fs').writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2));
          "

          # Install production deps
          cd deploy
          npm install --omit=dev --ignore-scripts 2>&1 | tail -5

          # Copy shared packages (replaces workspace: dep)
          mkdir -p packages/shared
          cp -r $GITHUB_WORKSPACE/packages/shared/* packages/shared/

          # Copy Prisma client from pnpm store
          PRISMA_CLIENT=$(find $GITHUB_WORKSPACE/node_modules -path "*/.prisma/client" -type d 2>/dev/null | head -1)
          PRISMA_PKG=$(find $GITHUB_WORKSPACE/node_modules -path "*/@prisma/client" -type d 2>/dev/null | head -1)
          if [ -n "$PRISMA_CLIENT" ]; then
            mkdir -p node_modules/.prisma
            cp -r "$PRISMA_CLIENT" node_modules/.prisma/client
          fi
          if [ -n "$PRISMA_PKG" ]; then
            mkdir -p node_modules/@prisma
            cp -r "$PRISMA_PKG" node_modules/@prisma/client
          fi

          echo "Deploy size: $(du -sh . | cut -f1)"
          zip -r -q ../deploy.zip .

      - name: Deploy to Azure App Service
        run: |
          echo "Deploying $(du -sh apps/api/deploy.zip | cut -f1) package..."
          # Base64 encode credentials to avoid shell escaping issues
          AUTH=$(echo -n '${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASS }}' | base64)
          HTTP_CODE=$(curl -s -o /tmp/deploy_out.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/zip" \
            --data-binary @apps/api/deploy.zip \
            "https://pcn-eol-api-staging.scm.azurewebsites.net/api/zipdeploy")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            cat /tmp/deploy_out.txt
            echo "Deployment failed!"
            exit 1
          fi
          echo "Deployment successful!"

  deploy-web:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://pcn-eol-api-staging.azurewebsites.net/api/v1
        run: pnpm --filter web build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /apps/web/dist
          skip_app_build: true
